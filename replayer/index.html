<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flight Record Replayer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h2>VeriWrite Replayer</h2>
  <input id="file" type="file" accept="application/json" />
  <span id="invalidInput" hidden="hidden" style="color: #F54927">Invalid file format</span>
  <span id="title"></span>
  <span id="events"></span>
  <span id="duration"></span> 
  <div id="screen"></div>
  <div>
  <progress id="replayProg" value="0" min="0" max="100"></progress>  
  </div>
  <button id="playBtn">Play</button>
  <button id="pauseBtn">Pause</button>
  <button id="resetBtn">Reset</button>
  <span id="speedLbl">Speed: 1x</span>

  <input id="speedSlider" type="range" min="0.1" max="5" step="0.1" value="1">
  <script src="./app.js"></script>
</body>
</html>
